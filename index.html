<!doctype html>
<html lang="pl">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Grzybodziad</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div id="rotate-message">
            <p>🔄 Obróć urządzenie</p>
        </div>
        <div id="game-container"></div>
        <script type="module" src="/src/main.ts"></script>
        <script>
            // Reload when device rotates to landscape so Phaser re-creates UI at correct dimensions
            window.matchMedia('(orientation: landscape)').addEventListener('change', function() { location.reload(); });

            // Fullscreen on first tap (mobile only).
            // - capture:true fires before Phaser's listeners (Phaser calls stopPropagation)
            // - pointerup instead of pointerdown: Phaser docs explicitly say pointerdown
            //   fails on Android/iOS because the audio context unlock consumes the gesture first
            if ('ontouchstart' in window && document.documentElement.requestFullscreen) {
                document.addEventListener('pointerup', function() {
                    document.documentElement.requestFullscreen().catch(function() {});
                }, { once: true, capture: true });
            }
        </script>
    </body>
</html>
